version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: agentic-ollama
    ports:
      - "11434:11434"          # Ollama's default REST API port
    volumes:
      - ollama_data:/root/.ollama   # persist downloaded models between restarts
    environment:
      - OLLAMA_KEEP_ALIVE=24h  # keep model loaded in memory, avoids cold-start
    restart: unless-stopped

volumes:
  ollama_data:                 # named volume = survives `docker compose down`